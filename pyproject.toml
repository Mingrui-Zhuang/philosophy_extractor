[project]
name = "philosophy-extractor"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.8"
dependencies = [
    "typer>=0.12,<1.0",
    "rich>=13,<14",
    "spacy>=3.7,<4.0",
    "scikit-learn>=1.5,<1.7",
    "transformers>=4.45,<5.0",
    "torch>=2.2,<2.6",
    "sentence-transformers>=3.0,<4.0",
    "keybert>=0.8,<1.0",
]

[project.scripts]
philosophy-extractor = "philosophy_extractor.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "ruff>=0.15.16",
]

[tool.hatch.build.targets.wheel]
packages = ["src/philosophy_extractor"]

[tool.hatch.build]
include = [
    "src/philosophy_extractor/data/*.txt"
]