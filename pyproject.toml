[project]
name = "philosophy-extractor"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "click>=8.4.1",
    "openai>=2.41.0",
    "rich>=15.0.0",
    "scikit-learn>=1.9.0",
    "sentence-transformers>=5.5.1",
    "spacy>=3.8.14",
    "srsly>=2.5.3",
    "thinc>=8.3.13",
    "typer>=0.26.7",
    "wasabi>=1.1.3",
]

[project.scripts]
philosophy-extractor = "philosophy_extractor.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"